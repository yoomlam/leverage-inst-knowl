services:
  db:
    image: postgres:18.4
    environment:
      POSTGRES_DB: likdb_test
      POSTGRES_USER: lik
      POSTGRES_PASSWORD: lik
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      # Also create the persistent likdb_local (manual testing) on first volume init.
      - ./db/init-local.sh:/docker-entrypoint-initdb.d/02-init-local.sh:ro
      # Postgres 18+ images store data in a major-version subdirectory; mount the
      # whole dir, not /var/lib/postgresql/data.
      - likdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lik -d likdb_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  lik-mcp:
    build: .
    environment:
      # Transport (streamable-http) and bind (LIK_HTTP_HOST=0.0.0.0) are image defaults
      # — see Dockerfile. Only the env-specific overrides live here.
      LIK_ENV: local              # override the image's fail-closed default for testing
      LIK_DB_HOST: db             # reach Postgres over the compose network
      LIK_DB_NAME: likdb_local    # persistent DB, survives the test suite's TRUNCATE
    ports:
      - "127.0.0.1:8000:8000"     # the 0.0.0.0 in-container bind is published to host loopback only
    depends_on:
      db:
        condition: service_healthy

volumes:
  likdata:
