<svg width="880" height="740" viewBox="0 0 880 740" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <title>LIK Strategy Levels 1–4 Diagram</title>
  <desc>Progressive build strategy: Level 1 MCP access, Level 2 computed Discovery Layer, two independent Level 3 extensions — Confirmations and Catalog — and Level 4, the flywheel that turns confirmed cross-source answers into new Discovery Layer outputs.</desc>

  <defs>
    <marker id="a" markerWidth="7" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#444"/>
    </marker>
    <marker id="aGold" markerWidth="7" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#B9770E"/>
    </marker>
  </defs>

  <rect width="880" height="740" fill="#F5F7FA"/>

  <!-- Title -->
  <text x="440" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#1A2A3A">LIK Implementation Strategy — Levels 1–4</text>
  <text x="440" y="52" text-anchor="middle" font-size="10" fill="#6B7785">Each level addresses a limitation of the one before it. Ship one, learn, then spend on the next.</text>

  <!-- ============================== -->
  <!-- LEVEL 1 -->
  <!-- ============================== -->
  <rect x="30" y="68" width="820" height="116" rx="7" fill="#E8F3FA" stroke="#2A7EAA" stroke-width="1.5"/>
  <rect x="30" y="68" width="100" height="116" rx="7" fill="#A9CCE3"/>
  <text x="80" y="118" text-anchor="middle" font-size="13" font-weight="700" fill="#1B4A6B">Level 1</text>
  <text x="80" y="136" text-anchor="middle" font-size="9" fill="#1B4A6B">Direct DS</text>
  <text x="80" y="148" text-anchor="middle" font-size="9" fill="#1B4A6B">Access</text>

  <rect x="148" y="80" width="192" height="60" rx="5" fill="#FFFFFF" stroke="#2A7EAA" stroke-width="1.2"/>
  <text x="244" y="102" text-anchor="middle" font-size="10" font-weight="700" fill="#1B4A6B">1.1  Read via MCP</text>
  <text x="244" y="118" text-anchor="middle" font-size="9" fill="#2A7EAA">Google SSO identity</text>
  <text x="244" y="131" text-anchor="middle" font-size="9" fill="#2A7EAA">DS enforces its own ACLs</text>

  <rect x="356" y="80" width="192" height="60" rx="5" fill="#FFFFFF" stroke="#2A7EAA" stroke-width="1.2"/>
  <text x="452" y="102" text-anchor="middle" font-size="10" font-weight="700" fill="#1B4A6B">1.2  Write via MCP</text>
  <text x="452" y="118" text-anchor="middle" font-size="9" fill="#2A7EAA">user's own SSO identity</text>
  <text x="452" y="131" text-anchor="middle" font-size="9" fill="#2A7EAA">new knowledge → DS</text>

  <rect x="564" y="80" width="272" height="60" rx="5" fill="#FFFFFF" stroke="#2A7EAA" stroke-width="1.2"/>
  <text x="700" y="102" text-anchor="middle" font-size="10" font-weight="700" fill="#1B4A6B">1.3  Query skills</text>
  <text x="700" y="118" text-anchor="middle" font-size="9" fill="#2A7EAA">hand-authored "where to look" guidance</text>
  <text x="700" y="131" text-anchor="middle" font-size="9" fill="#2A7EAA">shared · owned &amp; versioned · expect many</text>

  <rect x="148" y="154" width="684" height="18" rx="4" fill="#D6EAF8" stroke="#2A7EAA" stroke-width="1"/>
  <text x="490" y="166" text-anchor="middle" font-size="8.5" fill="#1B4A6B">⚠ Limitation: no reuse of computed results — every query re-runs the full cross-source retrieval live; hand-authored guidance drifts and must be hand-maintained</text>

  <line x1="440" y1="184" x2="440" y2="202" stroke="#444" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ============================== -->
  <!-- LEVEL 2 -->
  <!-- ============================== -->
  <rect x="30" y="204" width="820" height="118" rx="7" fill="#E9F7EF" stroke="#2D8B57" stroke-width="1.5"/>
  <rect x="30" y="204" width="100" height="118" rx="7" fill="#A9DFBF"/>
  <text x="80" y="252" text-anchor="middle" font-size="13" font-weight="700" fill="#1A5E34">Level 2</text>
  <text x="80" y="270" text-anchor="middle" font-size="9" fill="#1A5E34">Discovery</text>
  <text x="80" y="283" text-anchor="middle" font-size="9" fill="#1A5E34">Layer outputs</text>

  <rect x="148" y="216" width="290" height="74" rx="5" fill="#FFFFFF" stroke="#2D8B57" stroke-width="1.2"/>
  <text x="293" y="238" text-anchor="middle" font-size="10" font-weight="700" fill="#1A5E34">2.1  DL-creation skills</text>
  <text x="293" y="254" text-anchor="middle" font-size="9" fill="#2D8B57">automate what to precompute · expect many</text>
  <text x="293" y="269" text-anchor="middle" font-size="9" fill="#2D8B57">own service identity · least-privilege read</text>
  <text x="293" y="283" text-anchor="middle" font-size="8.5" fill="#5D8A5E">scheduled re-derivation bounds staleness</text>

  <rect x="454" y="216" width="382" height="74" rx="5" fill="#FFFFFF" stroke="#2D8B57" stroke-width="1.2"/>
  <text x="645" y="238" text-anchor="middle" font-size="10" font-weight="700" fill="#1A5E34">2.4  DL output types — written into a DS</text>
  <text x="645" y="254" text-anchor="middle" font-size="9" fill="#2D8B57">distilled prose · digests · indexes · pointers · freshness signals</text>
  <text x="645" y="269" text-anchor="middle" font-size="9" fill="#2D8B57">tagged discovery-layer · updated in place (same page)</text>
  <text x="645" y="283" text-anchor="middle" font-size="8" fill="#5D8A5E">2.2 ai-gen recomputable · human-verified/created durable · 2.3 one tier, default-deny</text>

  <rect x="148" y="304" width="684" height="18" rx="4" fill="#D5F5E3" stroke="#2D8B57" stroke-width="1"/>
  <text x="490" y="316" text-anchor="middle" font-size="8.5" fill="#1A5E34">⚠ Two limitations, each solved independently below: no human trust signal · no single entry point (outputs scattered across many stores)</text>

  <!-- Branch into two independent Level 3 extensions -->
  <line x1="440" y1="322" x2="440" y2="332" stroke="#444" stroke-width="1.5"/>
  <line x1="230" y1="332" x2="650" y2="332" stroke="#444" stroke-width="1.5"/>
  <line x1="230" y1="332" x2="230" y2="358" stroke="#444" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="650" y1="332" x2="650" y2="358" stroke="#444" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="440" y="349" text-anchor="middle" font-size="8.5" font-style="italic" fill="#6B7785">Two independent extensions of Level 2 — neither depends on the other; build in either order</text>

  <!-- ============================== -->
  <!-- LEVEL 3 — CONFIRMATIONS (left) -->
  <!-- ============================== -->
  <rect x="30" y="360" width="400" height="210" rx="7" fill="#F4ECF7" stroke="#7D3C98" stroke-width="1.5"/>
  <rect x="30" y="360" width="78" height="210" rx="7" fill="#D2B4DE"/>
  <text x="69" y="455" text-anchor="middle" font-size="12" font-weight="700" fill="#5B2282">Level 3</text>
  <text x="69" y="471" text-anchor="middle" font-size="8" fill="#5B2282">Confirmations</text>

  <text x="118" y="382" font-size="9" font-weight="700" fill="#5B2282">Solves: no human trust signal</text>

  <rect x="116" y="392" width="304" height="80" rx="5" fill="#FFFFFF" stroke="#7D3C98" stroke-width="1.2"/>
  <text x="268" y="414" text-anchor="middle" font-size="10" font-weight="700" fill="#5B2282">3.1  Confirmation signals</text>
  <text x="268" y="432" text-anchor="middle" font-size="9" fill="#7D3C98">users vouch a cited source was right / wrong</text>
  <text x="268" y="448" text-anchor="middle" font-size="9" fill="#7D3C98">durable · not recomputable · revert is only recovery</text>
  <text x="268" y="463" text-anchor="middle" font-size="8.5" fill="#8E6BA8">the source, not the answer · citation is the join key</text>

  <rect x="116" y="480" width="304" height="80" rx="5" fill="#FFFFFF" stroke="#7D3C98" stroke-width="1.2"/>
  <text x="268" y="502" text-anchor="middle" font-size="10" font-weight="700" fill="#5B2282">3.2  Used at query time</text>
  <text x="268" y="520" text-anchor="middle" font-size="8.5" fill="#7D3C98">annotation · staleness gating · ranking · audience weighting</text>
  <text x="268" y="536" text-anchor="middle" font-size="8.5" fill="#7D3C98">trust advises, never gates — users always see</text>
  <text x="268" y="549" text-anchor="middle" font-size="8.5" fill="#7D3C98">what they're entitled to</text>

  <!-- ============================== -->
  <!-- LEVEL 3 — CATALOG (right) -->
  <!-- ============================== -->
  <rect x="450" y="360" width="400" height="210" rx="7" fill="#FDFEFE" stroke="#2A7EAA" stroke-width="2"/>
  <rect x="450" y="360" width="78" height="210" rx="7" fill="#AED6F1"/>
  <text x="489" y="455" text-anchor="middle" font-size="12" font-weight="700" fill="#1B4A6B">Level 3</text>
  <text x="489" y="471" text-anchor="middle" font-size="8.5" fill="#1B4A6B">Catalog</text>

  <text x="538" y="382" font-size="9" font-weight="700" fill="#1B4A6B">Solves: no single entry point</text>

  <rect x="536" y="392" width="308" height="168" rx="6" fill="#EBF5FB" stroke="#2A7EAA" stroke-width="1.5"/>
  <rect x="618" y="400" width="144" height="18" rx="9" fill="#D6EAF8" stroke="#2A7EAA" stroke-width="1"/>
  <text x="690" y="412" text-anchor="middle" font-size="8.5" font-weight="700" fill="#1B4A6B">WELL-KNOWN ADDRESS</text>
  <text x="690" y="434" text-anchor="middle" font-size="11" font-weight="700" fill="#1B4A6B">Catalog — DL's "yellow pages"</text>
  <text x="690" y="451" text-anchor="middle" font-size="9" fill="#2A7EAA">maps  type + subject  →  location of any DL output</text>
  <text x="690" y="467" text-anchor="middle" font-size="9" fill="#2A7EAA">exact-match keyed lookup — no semantic search</text>
  <text x="690" y="483" text-anchor="middle" font-size="9" fill="#2A7EAA">the fallback when a Query skill can't place a question</text>
  <text x="690" y="499" text-anchor="middle" font-size="9" fill="#2A7EAA">stores pointers, not permissions · broken row = cache miss</text>
  <text x="690" y="521" text-anchor="middle" font-size="8.5" fill="#7AABCE" font-style="italic">promotes to Postgres / indexed DB at scale</text>

  <!-- Connector from Level 3-Catalog down into Level 4 -->
  <line x1="650" y1="570" x2="650" y2="592" stroke="#B9770E" stroke-width="1.5" marker-end="url(#aGold)"/>
  <text x="660" y="585" font-size="8" fill="#9C640C">registers in Catalog (§4.2)</text>

  <!-- ============================== -->
  <!-- LEVEL 4 — FLYWHEEL -->
  <!-- ============================== -->
  <rect x="30" y="592" width="820" height="128" rx="7" fill="#FEF9E7" stroke="#B9770E" stroke-width="1.5"/>
  <rect x="30" y="592" width="100" height="128" rx="7" fill="#F8E5A1"/>
  <text x="80" y="650" text-anchor="middle" font-size="13" font-weight="700" fill="#7E5109">Level 4</text>
  <text x="80" y="668" text-anchor="middle" font-size="9" fill="#7E5109">Flywheel</text>

  <text x="490" y="612" text-anchor="middle" font-size="10" font-weight="700" fill="#7E5109">Saved cross-source answers become new DL outputs — coverage grows from real demand, not guesswork</text>
  <text x="490" y="625" text-anchor="middle" font-size="8.3" font-style="italic" fill="#9C640C">Builds on Level 1 (§1.2 write model, §1.3 Query skill) and uses Level 3-Catalog · independent of Level 3-Confirmations</text>

  <!-- flywheel steps -->
  <rect x="148" y="634" width="158" height="50" rx="5" fill="#FFFFFF" stroke="#B9770E" stroke-width="1.1"/>
  <text x="227" y="652" text-anchor="middle" font-size="8.7" font-weight="700" fill="#7E5109">1 · Query skill synthesizes</text>
  <text x="227" y="666" text-anchor="middle" font-size="8" fill="#9C640C">fans out across DSs —</text>
  <text x="227" y="677" text-anchor="middle" font-size="8" fill="#9C640C">no DL answer exists yet</text>

  <rect x="330" y="634" width="158" height="50" rx="5" fill="#FFFFFF" stroke="#B9770E" stroke-width="1.1"/>
  <text x="409" y="652" text-anchor="middle" font-size="8.7" font-weight="700" fill="#7E5109">2 · User saves (create)</text>
  <text x="409" y="666" text-anchor="middle" font-size="8" fill="#9C640C">written to a DS under user SSO</text>
  <text x="409" y="677" text-anchor="middle" font-size="8" fill="#9C640C">born human-created · durable</text>

  <rect x="512" y="634" width="158" height="50" rx="5" fill="#FFFFFF" stroke="#B9770E" stroke-width="1.1"/>
  <text x="591" y="652" text-anchor="middle" font-size="8.7" font-weight="700" fill="#7E5109">3 · Service registers it</text>
  <text x="591" y="666" text-anchor="middle" font-size="8" fill="#9C640C">catalog row via service identity</text>
  <text x="591" y="677" text-anchor="middle" font-size="8" fill="#9C640C">user as created_by (§4.2)</text>

  <rect x="694" y="634" width="158" height="50" rx="5" fill="#FFFFFF" stroke="#B9770E" stroke-width="1.1"/>
  <text x="773" y="652" text-anchor="middle" font-size="8.7" font-weight="700" fill="#7E5109">4 · Next person retrieves</text>
  <text x="773" y="666" text-anchor="middle" font-size="8" fill="#9C640C">one lookup, no re-fan-out</text>
  <text x="773" y="677" text-anchor="middle" font-size="8" fill="#9C640C">can confirm it too → trust</text>

  <!-- arrows between steps -->
  <line x1="308" y1="659" x2="328" y2="659" stroke="#B9770E" stroke-width="1.3" marker-end="url(#aGold)"/>
  <line x1="490" y1="659" x2="510" y2="659" stroke="#B9770E" stroke-width="1.3" marker-end="url(#aGold)"/>
  <line x1="672" y1="659" x2="692" y2="659" stroke="#B9770E" stroke-width="1.3" marker-end="url(#aGold)"/>

  <!-- return loop -->
  <path d="M773,684 L773,700 L227,700 L227,686" stroke="#B9770E" stroke-width="1.2" fill="none" stroke-dasharray="4,3" marker-end="url(#aGold)"/>
  <text x="500" y="714" text-anchor="middle" font-size="8.3" font-style="italic" fill="#9C640C">each turn of the loop makes the next answer cheaper — usage drives confirmations, confirmations drive new outputs</text>

</svg>
